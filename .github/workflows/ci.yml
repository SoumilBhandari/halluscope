name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (no model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # Install the CPU-only PyTorch wheel first so the requirements install
      # does not pull the much larger CUDA build (CI has no GPU).
      - name: Install CPU-only PyTorch
        run: pip install "torch>=2.2,<3" --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -m "not integration"
